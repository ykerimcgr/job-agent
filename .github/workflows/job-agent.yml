name: AI Job Agent

on:
  workflow_dispatch:
  schedule:
  - cron: "0 8-16 * * 1-5"

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            latexmk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Recreate private profile files
        run: |
          mkdir -p profile
          echo "${{ secrets.MASTER_CV_TEX_B64 }}" | base64 --decode > profile/master_cv.tex
          echo "${{ secrets.CONTACT_RULES_JSON_B64 }}" | base64 --decode > profile/contact_rules.json
          echo "${{ secrets.LOCATION_RULES_JSON_B64 }}" | base64 --decode > profile/location_rules.json

      - name: Run AI Job Agent
        env:
          OPEN_AI_SECRET_KEY: ${{ secrets.OPEN_AI_SECRET_KEY }}

          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python main.py